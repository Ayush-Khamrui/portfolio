{% extends 'base.html' %}
{% block body %}
<div class="Container" style="padding-top:2%;padding-left: 5%;padding-right: 5%;">
    <table class="table table-striped table-success">
        <thead>
        <tr>
            <th scope="col">SNo.</th>
            <th scope="col">Title</th>
            <th scope="col">Time</th>
        </tr>
        </thead>
        <tbody>
            {% for questions in answers %}
                <tr>
                    <th scope="row">{{loop.index}}</th>
                    <td>{{questions.title}}</td>
                    <td>{{questions.date}}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock body %}
