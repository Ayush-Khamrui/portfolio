{% extends 'base.html' %}
{% block body %}
    <div style="background-color: beige;">
        <br>
        <div class="Container" style="padding-left: 10%;padding-right: 10%; background-color: beige;">
            <center><h3><u>Update Data</u></h3></center>
            <form action="/update/{{update.sno}}" method="POST">
                <div class="form-group">
                <label for="exampleFormControlInput1">Title</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="1" name="title" type="input">{{update.title}}</textarea>
                </div>
                <div class="form-group">
                <label for="exampleFormControlTextarea1">Description</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows=auto name="description" type="input">{{update.description}}</textarea>
                </div>
                <div class="form-group">
                    <label for="exampleFormControlTextarea1">Answer</label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="19" name="answer" type="input">{{update.answer}}</textarea>
                </div>
                <br>
                <button class="btn btn-primary" type="submit">Submit</button>
            </form>
        </div>
    </div>
    
{% endblock body %}
